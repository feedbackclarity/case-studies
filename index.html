document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"f0e786fd-6261-4dc9-94ae-9dae8804a648\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0}\n  body{font-family:-apple-system,BlinkMacSystemFont,\"Segoe UI\",system-ui,\"Helvetica Neue\",Arial,sans-serif;-webkit-font-smoothing:antialiased}\n  a{color:inherit}\n  @media print{\n    [data-print-hide]{display:none !important}\n    body,.fc-page{background:#fff !important}\n    .fc-main{max-width:100% !important;padding:0 !important}\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"fc-page\" style=\"min-height:100vh;background:#EEF3F6;color:#1B2733\">\n\n  <div data-print-hide=\"\" style=\"background:#FDF3D6;color:#7A5B00;border-bottom:1px solid #F2E0A8;font-size:12.5px;text-align:center;padding:8px 16px;font-weight:600;line-height:1.4\">DRAFT — internal review only. Narrative details are illustrative and pending client confirmation before any external or public use.<\u002Fdiv>\n\n  <header data-print-hide=\"\" style=\"background:linear-gradient(120deg,#0A2540,#0E2F52);color:#fff;padding:18px 24px\">\n    <div style=\"max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap\">\n      <div onclick=\"{{ goHome }}\" style=\"display:flex;align-items:center;gap:16px;cursor:pointer\">\n        <span style=\"display:inline-flex;align-items:center;background:#fff;border-radius:9px;padding:7px 12px;height:38px;box-sizing:border-box;box-shadow:0 2px 8px rgba(0,0,0,.18)\">\n          <img data-logo=\"1\" src=\"https://feedbackclarity.com/wp-content/uploads/2021/09/feedback_clarity_logo_2024.svg\" alt=\"FeedbackClarity\" style=\"height:22px;display:block\">\n          <span data-wordmark=\"\" style=\"display:none;font-weight:800;font-size:16px;letter-spacing:-.01em\"><span style=\"color:#0A2540\">Feedback<\u002Fspan><span style=\"color:#17A2A6\">Clarity<\u002Fspan><\u002Fspan>\n        <\u002Fspan>\n        <span style=\"font-size:13px;color:#9DB4C7;max-width:230px;line-height:1.4\">We remove the reviews that don't belong — and protect the ones that do.<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap\">\n        <div style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 13px;text-align:center;min-width:84px\">\n          <div style=\"font-weight:800;font-size:18px\">17,451<\u002Fdiv><div style=\"font-size:10.5px;color:#9DB4C7;text-transform:uppercase;letter-spacing:.05em;margin-top:2px\">Reviews removed · 12 mo<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 13px;text-align:center;min-width:84px\">\n          <div style=\"font-weight:800;font-size:18px\">1,500+<\u002Fdiv><div style=\"font-size:10.5px;color:#9DB4C7;text-transform:uppercase;letter-spacing:.05em;margin-top:2px\">Businesses protected<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 13px;text-align:center;min-width:84px\">\n          <div style=\"font-weight:800;font-size:18px\">9<\u002Fdiv><div style=\"font-size:10.5px;color:#9DB4C7;text-transform:uppercase;letter-spacing:.05em;margin-top:2px\">Industries served<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 13px;text-align:center;min-width:84px\">\n          <div style=\"font-weight:800;font-size:18px\">24/7<\u002Fdiv><div style=\"font-size:10.5px;color:#9DB4C7;text-transform:uppercase;letter-spacing:.05em;margin-top:2px\">Reputation monitoring<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main class=\"fc-main\" style=\"max-width:1180px;margin:0 auto;padding:0 24px 8px\">\n\n    <sc-if value=\"{{ notHome }}\">\n      <nav data-print-hide=\"\" style=\"font-size:13px;color:#5B6B7B;margin:22px 0 4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap\">\n        <a onclick=\"{{ goHome }}\" style=\"color:#0E7C80;cursor:pointer;text-decoration:none;font-weight:600\">All industries<\u002Fa>\n        <span style=\"color:#9DB4C7\">›<\u002Fspan>\n        <sc-if value=\"{{ isIndustry }}\"><span style=\"font-weight:600;color:#1B2733\">{{ bcIndustry }}<\u002Fspan><\u002Fsc-if>\n        <sc-if value=\"{{ isCase }}\"><a onclick=\"{{ crumbIndustryOpen }}\" style=\"color:#0E7C80;cursor:pointer;text-decoration:none;font-weight:600\">{{ bcIndustry }}<\u002Fa><span style=\"color:#9DB4C7\">›<\u002Fspan><span style=\"font-weight:600;color:#1B2733\">{{ bcCase }}<\u002Fspan><\u002Fsc-if>\n      <\u002Fnav>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <section style=\"padding:38px 0 10px\">\n        <div style=\"text-transform:uppercase;letter-spacing:.14em;font-size:12px;font-weight:800;color:#0E7C80\">Client success stories<\u002Fdiv>\n        <h1 style=\"font-size:clamp(30px,4.4vw,46px);font-weight:800;letter-spacing:-.03em;color:#0A2540;margin:12px 0 0;max-width:780px;line-height:1.08;text-wrap:balance\">The reviews we removed — and the businesses we gave their reputation back.<\u002Fh1>\n        <p style=\"font-size:16px;color:#5B6B7B;max-width:640px;margin:16px 0 0;line-height:1.6\">Browse real removal results across nine industries. Every number is policy-violating Google reviews taken off in the trailing 12 months.<\u002Fp>\n      <\u002Fsection>\n\n      <div style=\"display:flex;align-items:center;gap:12px;margin:26px 0 16px\">\n        <span style=\"text-transform:uppercase;letter-spacing:.1em;font-size:12px;font-weight:800;color:#5B6B7B\">9 industries<\u002Fspan>\n        <span style=\"flex:1;heig ttom:9px\">What FeedbackClarity Did<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#1B2733;margin:0\">{{ cs.did }}<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <div style=\"text-transform:uppercase;letter-spacing:.12em;font-size:12px;font-weight:800;color:#0E7C80;margin-bottom:9px\">The Outcome<\u002Fdiv>\n          <p style=\"font-size:16px;line-height:1.65;color:#1B2733;margin:0\">{{ cs.outcome }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#E6F4F4;border-left:4px solid #17A2A6;border-radius:0 12px 12px 0;padding:18px 22px;color:#1B2733;font-size:15px;line-height:1.65;margin-top:28px;max-width:820px\"><b style=\"color:#0E7C80\">Why it works — <\u002Fb>30–60% of flagged reviews come off in the first 60–90 days, client review volume improves an average of 247% in the first 30 days, and Harvard Business Review: moving from 3 to 5 stars can lift revenue ~18%.<\u002Fdiv>\n\n      <div data-print-hide=\"\" style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:28px\">\n        <button onclick=\"{{ doPrint }}\" style=\"background:#17A2A6;color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit\" style-hover=\"background:#0E7C80\">Download one-pager (PDF)<\u002Fbutton>\n        <button onclick=\"{{ doPrint }}\" style=\"background:transparent;color:#0A2540;border:1px solid #C3D2DD;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit\" style-hover=\"border-color:#17A2A6;color:#0E7C80\">Print / Save as PDF<\u002Fbutton>\n        <button onclick=\"{{ cs.back }}\" style=\"background:transparent;color:#5B6B7B;border:1px solid #C3D2DD;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit\" style-hover=\"border-color:#17A2A6;color:#0E7C80\">← Back<\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <footer data-print-hide=\"\" style=\"background:#0A2540;color:#9DB4C7;padding:22px 24px;margin-top:48px\">\n    <div style=\"max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;font-size:13px\">\n      <div style=\"display:flex;align-items:center;gap:12px\">\n        <span style=\"display:inline-flex;align-items:center;background:#fff;border-radius:8px;padding:5px 10px;height:30px;box-sizing:border-box\">\n          <img data-logo=\"1\" src=\"https://feedbackclarity.com/wp-content/uploads/2021/09/feedback_clarity_logo_2024.svg\" alt=\"FeedbackClarity\" style=\"height:18px;display:block\">\n          <span data-wordmark=\"\" style=\"display:none;font-weight:800;font-size:14px\"><span style=\"color:#0A2540\">Feedback<\u002Fspan><span style=\"color:#17A2A6\">Clarity<\u002Fspan><\u002Fspan>\n        <\u002Fspan>\n        <span>© FeedbackClarity · feedbackclarity.com<\u002Fspan>\n      <\u002Fdiv>\n      <span>30–60% of flagged reviews removed in 60–90 days · No contracts<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.DATA = this.buildData();\n  }\n  state = { view: 'home', industryId: null, caseId: null };\n\n  fmt(n){ return n.toLocaleString('en-US'); }\n\n  monoOf(name){\n    const stop = new Set(['the','and','of','at','a','&']);\n    const words = name.replace(/[^A-Za-z0-9]+/g,' ').trim().split(' ').filter(w=>w && !stop.has(w.toLowerCase()));\n    const m = ((words[0]||'')[0]||'') + ((words[1]||'')[0]||'');\n    return (m||'FC').toUpperCase();\n  }\n\n  go(view, industryId, caseId){\n    this.setState({ view, industryId: industryId||null, caseId: caseId||null });\n    try { window.scrollTo(0,0); } catch(e){}\n  }\n\n  prepCase(c, ind){\n    const brand = c.brandColor || '#0A2540';\n    const cb = c.domain ? ('https://logo.clearbit.com/' + c.domain) : '';\n    const mono = c.mono || this.monoOf(c.name);\n    let hasImg=true, imgSrc='', imgFit='cover', imgPad='0', imgTried='0', heroFit='cover', heroPad='0';\n    if (c.image && !c.isLogo){ imgSrc=c.image; imgFit='cover'; imgPad='0'; imgTried='0'; heroFit='cover'; heroPad='0'; }\n    else if (c.image && c.isLogo){ imgSrc=c.image; imgFit='contain'; imgPad='16%'; imgTried='0'; heroFit='contain'; heroPad='8%'; }\n    else if (cb){ imgSrc=cb; imgFit='contain'; imgPad='18%'; imgTried='1'; heroFit='contain'; heroPad='9%'; }\n    else { hasImg=false; }\n    return {\n      id:c.id, name:c.name, location:c.location, subtitle:c.subtitle||'',\n      brandColor:brand, domain:c.domain||'', hasDomain:!!c.domain,\n      removed:this.fmt(c.removed), metric:this.fmt(c.removed),\n      challenge:c.challenge, did:c.did, outcome:c.outcome, chips:c.chips,\n      flagship:!!c.flagship, notFlagship:!c.flagship, mono:mono,\n      hasImg, imgSrc, imgFit, imgPad, imgTried, clearbit:cb, heroFit, heroPad,\n      chipHasImg:!!cb, chipSrc:cb,\n      fromDomain: c.domain ? ('From ' + c.domain) : '',\n      indName: ind.name,\n      open: ()=>this.go('case', ind.id, c.id),\n      onKey: (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); this.go('case', ind.id, c.id); } },\n      back: ()=>this.go('industry', ind.id),\n      openIndustry: ()=>this.go('industry', ind.id),\n    };\n  }\n\n  renderVals(){\n    const v = this.state.view;\n    const isHome = v==='home', isIndustry = v==='industry', isCase = v==='case';\n    const fmt = (n)=>this.fmt(n);\n\n    const home = {};\n    this.DATA.forEach(ind=>{\n      const total = ind.cases.reduce((s,c)=>s+c.removed,0);\n      home[ind.id] = {\n        stories: String(ind.cases.length),\n        removed: fmt(total),\n        open: ()=>this.go('industry', ind.id),\n        onKey: (e)=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); this.go('industry', ind.id); } },\n      };\n    });\n\n    let ind = null;\n    if (isIndustry || isCase) ind = this.DATA.find(i=>i.id===this.state.industryId) || null;\n\n    let indName='', indDesc='', indStats='', indCases=[];\n    if (isIndustry && ind){\n      const total = ind.cases.reduce((s,c)=>s+c.removed,0);\n      indName = ind.name; indDesc = ind.desc;\n      indStats = ind.cases.length + ' success stories · ' + fmt(total) + ' reviews removed';\n      indCases = ind.cases.map(c=>this.prepCase(c, ind));\n    }\n\n    let cs = null;\n    if (isCase && ind){\n      const c = ind.cases.find(x=>x.id===this.state.caseId);\n      if (c) cs = this.prepCase(c, ind);\n    }\n\n    return {\n      isHome, isIndustry, isCase, notHome: !isHome,\n      home, indName, indDesc, indStats, indCases, cs,\n      bcIndustry: ind ? ind.name : '',\n      bcCase: cs ? cs.name : '',\n      goHome: ()=>this.go('home', null, null),\n      crumbIndustryOpen: ()=>this.go('industry', this.state.industryId),\n      doPrint: ()=>{ try{ window.print(); }catch(e){} },\n    };\n  }\n\n  componentDidMount(){ this.hydrateImgs(); }\n  componentDidUpdate(){ this.hydrateImgs(); }\n\n  hydrateImgs(){\n    document.querySelectorAll('img[data-logo]').forEach(el=>{\n      if(el.dataset.bound!=='1'){\n        el.dataset.bound='1';\n        el.onerror=()=>{ el.style.display='none'; const w=el.nextElementSibling; if(w) w.style.display='inline-flex'; };\n        if(el.complete && el.naturalWidth===0){ el.onerror(); }\n      }\n    });\n    document.querySelectorAll('img[data-img]').forEach(el=>{\n      const want = el.getAttribute('data-src')||'';\n      if(!want || want.indexOf('{{')!==-1) return;\n      if(el.dataset.bound!=='1'){\n        el.dataset.bound='1';\n        el.onerror=()=>{\n          const cb=el.dataset.clearbit||'';\n          if(cb && el.dataset.tried!=='1' && el.getAttribute('src')!==cb){ el.dataset.tried='1'; el.style.objectFit='contain'; el.style.padding='16%'; el.src=cb; }\n          else { el.style.display='none'; }\n        };\n      }\n      if(el.getAttribute('src')!==wan
